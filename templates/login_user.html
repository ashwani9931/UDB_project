<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - CourseHub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-primary: #7c3aed;
            --color-primary-dark: #6d28d9;
            --color-primary-light: #a78bfa;
            --color-bg: #0f172a;
            --color-surface: #1e293b;
            --color-text: #f1f5f9;
            --color-text-secondary: #cbd5e1;
            --color-text-tertiary: #94a3b8;
            --color-border: rgba(148, 163, 184, 0.15);
            --transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Roboto', sans-serif;
            background: linear-gradient(135deg, var(--color-bg) 0%, #1a2332 100%);
            color: var(--color-text);
            line-height: 1.6;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(124, 58, 237, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: backgroundShift 20s ease infinite;
        }

        @keyframes backgroundShift {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.8;
            }
        }

        /* Animated Blobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
            z-index: -1;
        }

        .blob-1 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.3), rgba(124, 58, 237, 0.1));
            top: -100px;
            left: -100px;
            animation: float 20s ease-in-out infinite;
        }

        .blob-2 {
            width: 250px;
            height: 250px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(59, 130, 246, 0.05));
            bottom: -80px;
            right: -80px;
            animation: float 25s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0);
            }
            33% {
                transform: translate(30px, -30px);
            }
            66% {
                transform: translate(-30px, 30px);
            }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 24px;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Card */
        .login-card {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid var(--color-border);
            border-radius: 20px;
            padding: 48px 32px;
            backdrop-filter: blur(12px) saturate(180%);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: var(--transition);
        }

        .login-card:hover {
            background: rgba(30, 41, 59, 0.5);
            border-color: rgba(148, 163, 184, 0.3);
        }

        /* Header */
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 16px;
            animation: logoBounce 2s ease infinite;
        }

        @keyframes logoBounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        .login-title {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--color-text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .login-subtitle {
            font-size: 14px;
            color: var(--color-text-tertiary);
        }

        /* Form */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 13px;
            font-weight: 700;
            color: var(--color-text);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            padding: 13px 16px;
            background: rgba(148, 163, 184, 0.08);
            border: 1px solid var(--color-border);
            border-radius: 10px;
            color: var(--color-text);
            font-size: 14px;
            font-family: inherit;
            transition: var(--transition);
        }

        .form-input::placeholder {
            color: var(--color-text-tertiary);
        }

        .form-input:focus {
            outline: none;
            background: rgba(148, 163, 184, 0.12);
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1), inset 0 0 0 1px rgba(124, 58, 237, 0.2);
        }

        .form-input:valid {
            border-color: rgba(16, 185, 129, 0.3);
        }

        /* Submit Button */
        .btn-submit {
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(124, 58, 237, 0.4), inset 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .btn-submit:hover::before {
            left: 100%;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        /* Links */
        .login-footer {
            text-align: center;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--color-border);
        }

        .login-footer-text {
            font-size: 13px;
            color: var(--color-text-tertiary);
            margin-bottom: 12px;
        }

        .login-links {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .login-link {
            color: var(--color-primary-light);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: var(--transition);
            position: relative;
        }

        .login-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--color-primary-light);
            transition: width 0.3s ease;
        }

        .login-link:hover::after {
            width: 100%;
        }

        /* Error Message */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 12px 16px;
            border-radius: 8px;
            color: #fca5a5;
            font-size: 13px;
            margin-bottom: 16px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Success Message */
        .success-message {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 12px 16px;
            border-radius: 8px;
            color: #86efac;
            font-size: 13px;
            margin-bottom: 16px;
            animation: slideIn 0.3s ease;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                max-width: 100%;
            }

            .login-card {
                padding: 40px 24px;
                border-radius: 16px;
            }

            .login-title {
                font-size: 24px;
            }

            .logo {
                font-size: 40px;
            }

            .btn-submit {
                padding: 12px 20px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <!-- Login Container -->
    <div class="container">
        <div class="login-card">
            <!-- Header -->
            <div class="login-header">
                <div class="logo"><img src="{{ url_for('static', filename='logo.png') }}" onerror="this.src='{{ url_for('static', filename='logo.jpeg') }}'" alt="CourseHub Logo" style="width: 60px; height: 60px; border-radius: 8px; object-fit: contain; object-position: left center;"></div>
                <h1 class="login-title">CourseHub</h1>
                <p class="login-subtitle">Join the learning revolution</p>
            </div>

            <!-- Form -->
            <form action="{{ url_for('login_user_post') }}" method="post" class="login-form">
                {% if error %}
                <div class="error-message">{{ error }}</div>
                {% endif %}

                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="Enter your email address" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn-submit">Sign In</button>
            </form>

            <!-- Footer -->
            <div class="login-footer">
                <p class="login-footer-text">New to CourseHub?</p>
                <div class="login-links">
                    <a href="{{ url_for('register_user') }}" class="login-link">Create Account</a>
                    <span style="color: var(--color-text-tertiary);">•</span>
                    <a href="{{ url_for('login_admin') }}" class="login-link">Admin Login</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
